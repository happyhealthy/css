<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrari Style Layout</title>
    <style>
        /* --- CSS STYLES --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 200px;
            background-color: #111;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-header {
            font-size: 10px;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 30px;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links li {
            margin-bottom: 18px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #aaa;
        }

        /* Main Grid Layout */
        .content-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 2fr 1fr; /* Left is twice as wide as right column */
            height: 100%;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            background-color: #000; /* Ensures background is black if image doesn't fill */
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            /* CHANGED FROM cover TO contain TO SHOW WHOLE PHOTO */
            object-fit: contain; 
            display: block;
        }

        /* Right Stack Styling */
        .right-stack {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr; /* Three equal height rows */
            border-left: 2px solid #000;
        }

        .sub-feature {
            border-bottom: 2px solid #000;
        }

        /* Text Overlays */
        .overlay {
            position: absolute;
            bottom: 50px;
            left: 40px;
            z-index: 2; /* Ensures text stays above image */
        }

        .overlay h1 {
            font-size: 42px;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Helps visibility */
        }

        .discover-btn {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .overlay-bottom {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .overlay-bottom h3 {
            font-size: 14px;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .circle-arrow {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
        }

        .arrow {
            margin-left: 10px;
            border: 1px solid #fff;
            border-radius: 50%;
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav class="sidebar">
            <div class="nav-header">COLLECTIONS</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Overview</a></li>
                <li><a href="#">Gifts</a></li>
                <li><a href="#">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
                <li><a href="#">Collectibles</a></li>
                <li><a href="#">Eyewear</a></li>
                <li><a href="#">Scuderia Ferrari Selection</a></li>
            </ul>
        </nav>

        <main class="content-grid">
            
            <div class="grid-item main-feature">
                <img src="pic1.jpg" alt="New Arrivals">
                <div class="overlay">
                    <h1>NEW ARRIVALS</h1>
                    <a href="#" class="discover-btn">DISCOVER MORE <span class="arrow">→</span></a>
                </div>
            </div>

            <div class="right-stack">
                <div class="grid-item sub-feature">
                    <img src="pic2.jpg" alt="Women's Bags">
                    <div class="overlay-bottom">
                        <h3>WOMEN'S BAGS</h3>
                        <div class="circle-arrow">→</div>
                    </div>
                </div>

                <div class="grid-item sub-feature">
                    <img src="pic3.jpg" alt="Spring Summer">
                    <div class="overlay-bottom">
                        <h3>SPRING/SUMMER 2026</h3>
                        <div class="circle-arrow">→</div>
                    </div>
                </div>

                <div class="grid-item sub-feature">
                    <img src="pic4.jpg" alt="Eyewear">
                    <div class="overlay-bottom">
                        <h3>EYEWEAR</h3>
                        <div class="circle-arrow">→</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
